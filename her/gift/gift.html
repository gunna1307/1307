<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Birthday Gift</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="gift.css">

</head>

<body>

<!-- Background -->

<div class="background"></div>
<div class="overlay"></div>

<!-- Hearts -->

<div class="hearts">

<span>💖</span>
<span>💕</span>
<span>💗</span>
<span>💘</span>
<span>❤️</span>
<span>💝</span>

</div>

<!-- Sparkles -->

<div class="sparkles">

<span>✨</span>
<span>⭐</span>
<span>✨</span>
<span>⭐</span>
<span>✨</span>
<span>⭐</span>

</div>

<!-- Confetti -->

<div id="confetti"></div>

<!-- Main -->

<div class="container">

<h1>Your Birthday Gift 🎁</h1>

<p class="subtitle">

Someone packed lots of love for you ❤️

</p>

<!-- Gift Box -->

<div id="giftBox">

<div class="lid"></div>

<div class="box"></div>

<div class="ribbon-v"></div>

<div class="ribbon-h"></div>

</div>

<p id="clickText">

Click the Gift Box 🎁

</p>

<!-- Cake -->

<div id="cakeSection">

<img src="cake.png" class="cake">

</div>

<!-- Teddy -->

<div id="teddySection">

<img src="../teddy.png.png" class="teddy">

<div class="bubble">

<p id="message"></p>

<button id="nextBtn">

💌 Continue

</button>

</div>

</div>

</div>

<!-- Sounds -->

<audio id="openSound">

<source src="../sounds/success.mp3.wav">

</audio>

<audio id="bgMusic" loop>

<source src="../sounds/bg-music.mp3">

</audio>

<audio id="typing">

<source src="../sounds/typing.wav">

</audio>

<script src="gift.js"></script>

</body>

</html>
